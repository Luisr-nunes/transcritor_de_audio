[package]
name    = "transcription-service"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "transcription-service"
path = "src/main.rs"

[dependencies]
# Web Framework
axum   = { version = "0.7", features = ["multipart"] }
tokio  = { version = "1.0", features = ["full"] }
tower  = "0.4"

# Banco de dados e serialização
sqlx      = { version = "0.7", features = ["runtime-tokio", "tls-rustls", "sqlite", "macros"] }
serde     = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Processamento de Áudio (Whisper)
# API 0.16: state.as_iter() -> impl Iterator<Item = WhisperSegment>
# WhisperSegment implementa Display para o texto transcrito.
whisper-rs = "0.16"

# Tratamento de erros
thiserror = "1.0"

# Logs
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilitários
uuid = { version = "1.0", features = ["v4", "serde"] }

[profile.release]
opt-level = 3
lto       = true
