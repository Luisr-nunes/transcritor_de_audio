[package]
name = "transcription-service"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web Framework
axum = "0.7"
tokio = { version = "1.0", features = ["full"] }

# Banco de dados e JSON
sqlx = { version = "0.7", features = ["runtime-tokio", "tls-rustls", "sqlite", "macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Processamento de Áudio (Whisper)
# Nota: Você precisará da lib whisper.cpp instalada no sistema
whisper-rs = "0.13" 

# Logs e Utilitários
tracing = "0.1"
tracing-subscriber = "0.3"
uuid = { version = "1.0", features = ["v4"] }